# =================================================================
# EZ Pilot — Nginx server block for ez-pilot.com
# Place in /etc/nginx/sites-available/ez-pilot.com and symlink to sites-enabled
# Use certbot for the actual certificate: certbot --nginx -d ez-pilot.com -d www.ez-pilot.com
# =================================================================

# ---- HTTP → HTTPS redirect (port 80) ----
server {
    listen 80;
    listen [::]:80;
    server_name ez-pilot.com www.ez-pilot.com;
    return 301 https://ez-pilot.com$request_uri;
}

# ---- www → apex redirect on HTTPS ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ez-pilot.com;

    ssl_certificate     /etc/letsencrypt/live/ez-pilot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ez-pilot.com/privkey.pem;

    return 301 https://ez-pilot.com$request_uri;
}

# ---- Main HTTPS server ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ez-pilot.com;

    root /var/www/ez-pilot.com;
    index ez-pilot.html index.html;

    # ---- TLS ----
    ssl_certificate     /etc/letsencrypt/live/ez-pilot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ez-pilot.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.x.ai https://api.mistral.ai https://api.deepseek.com https://api.perplexity.ai; frame-ancestors 'none'" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # ---- Caching ----
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(css|js|svg|woff2|png|jpg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /ez-pilot.html;
    }
}
