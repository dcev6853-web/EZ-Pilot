# =================================================================
# EZ Pilot — Netlify config for ez-pilot.com
# =================================================================

[build]
  publish = "."

# ---- Force HTTPS + canonical apex domain ----
# www.ez-pilot.com → https://ez-pilot.com
[[redirects]]
  from = "http://www.ez-pilot.com/*"
  to   = "https://ez-pilot.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.ez-pilot.com/*"
  to   = "https://ez-pilot.com/:splat"
  status = 301
  force  = true

# Plain HTTP → HTTPS
[[redirects]]
  from = "http://ez-pilot.com/*"
  to   = "https://ez-pilot.com/:splat"
  status = 301
  force  = true

# ---- Security headers (also defined in _headers as fallback) ----
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(self), payment=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.x.ai https://api.mistral.ai https://api.deepseek.com https://api.perplexity.ai; frame-ancestors 'none'"
